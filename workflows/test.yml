name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecovision
          POSTGRES_PASSWORD: ecovision
          POSTGRES_DB: ecovision_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecovision"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: testing
      SECRET_KEY: ci_test_secret_key_not_for_production
      DATABASE_URL: postgresql+psycopg2://ecovision:ecovision@localhost:5432/ecovision_ai_test
      OPENWEATHER_API_KEY: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U ecovision; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run pytest
        working-directory: backend
        run: pytest -q --maxfail=1

      - name: Compile-check all Python files
        working-directory: backend
        run: |
          find . -name "*.py" -not -path "./venv/*" -not -path "*/.venv/*" \
            -print0 | xargs -0 -I{} python -m py_compile {}
