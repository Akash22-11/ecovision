services:
  - type: web
    name: ecovision-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: ecovision-db
          property: connectionString

      - key: ENVIRONMENT
        value: production

      - key: APP_ENV
        value: production

      - key: OPENWEATHER_API_KEY
        sync: false

      - key: CORS_ORIGINS
        sync: false

    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: ecovision-db
    databaseName: ecovision
    user: ecovision_user
    plan: free
    region: oregon
