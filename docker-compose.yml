services:
  db:
    image: postgres:16-alpine
    container_name: ecovision-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecovision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecovision}
      POSTGRES_DB: ${POSTGRES_DB:-ecovision_ai}
    volumes:
      - ecovision_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecovision}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecovision-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ecovision}:${POSTGRES_PASSWORD:-ecovision}@db:5432/${POSTGRES_DB:-ecovision_ai}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./app/uploads:/backend/app/uploads
      - ./logs:/backend/logs

volumes:
  ecovision_postgres_data:
